<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0f">
<meta name="description" content="iRacing Setup Advisor — Late Model Stock, Street Stock, Mini Stock">
<title>The Big Chief - Powered by Allison Racing</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏁</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Teko:wght@400;500;600;700&family=Rajdhani:wght@400;500;600;700&family=Barlow+Condensed:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--red:#e82a1c;--red-dark:#b81e14;--red-glow:rgba(232,42,28,0.35);--gold:#d4a827;--blue:#2874c8;--green:#28a844;--bg:#080809;--surface:rgba(255,255,255,0.03);--border:rgba(255,255,255,0.08);--text:#f0ece4;--text-dim:#9a958c;--text-faint:#6a665e}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow-x:hidden}
body{background:var(--bg);font-family:'Rajdhani',sans-serif;color:var(--text)}
.bg{position:fixed;inset:0;z-index:0;overflow:hidden;background:linear-gradient(175deg,#0d0d10 0%,#080809 30%,#0a0808 60%,#080809 100%)}
.bg::before{content:"";position:absolute;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");opacity:.8}
.bg .skid1{position:absolute;top:10%;left:8px;width:3px;height:40%;background:linear-gradient(180deg,transparent,rgba(30,30,30,0.6) 20%,rgba(40,40,40,0.4) 60%,transparent);border-radius:2px;transform:rotate(1deg)}
.bg .skid2{position:absolute;top:8%;left:16px;width:2px;height:35%;background:linear-gradient(180deg,transparent,rgba(30,30,30,0.4) 25%,rgba(35,35,35,0.3) 50%,transparent);border-radius:2px}
.bg .heat1{position:absolute;top:-15%;right:-5%;width:600px;height:600px;background:radial-gradient(ellipse,rgba(232,42,28,0.07) 0%,transparent 70%);border-radius:50%;filter:blur(60px);animation:heatPulse 4s ease-in-out infinite}
.bg .heat2{position:absolute;bottom:-10%;left:-5%;width:400px;height:400px;background:radial-gradient(ellipse,rgba(232,42,28,0.04) 0%,transparent 60%);border-radius:50%;filter:blur(50px);animation:heatPulse 5s ease-in-out 1s infinite}
.bg .checker{position:absolute;bottom:0;right:0;width:200px;height:200px;opacity:.02;background-image:url("data:image/svg+xml,%3Csvg width='20' height='20' viewBox='0 0 20 20' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='10' height='10' fill='white'/%3E%3Crect x='10' y='10' width='10' height='10' fill='white'/%3E%3C/svg%3E");transform:rotate(-15deg);transform-origin:bottom right}
@keyframes fadeIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes heatPulse{0%,100%{opacity:.6;transform:scale(1)}50%{opacity:1;transform:scale(1.05)}}
@keyframes rpmSweep{0%{width:0}40%{width:100%}100%{width:65%}}
@keyframes redlinePulse{0%,100%{box-shadow:0 0 8px rgba(232,42,28,0.2)}50%{box-shadow:0 0 20px rgba(232,42,28,0.4)}}
@keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
.app{position:relative;z-index:1;min-height:100vh;padding:20px 16px env(safe-area-inset-bottom,40px);max-width:820px;margin:0 auto}
.hdr{text-align:center;margin-bottom:28px;animation:fadeIn .6s ease both}
.hdr .flag-bar{height:8px;margin:0 -16px 16px;background-image:url("data:image/svg+xml,%3Csvg width='16' height='8' viewBox='0 0 16 8' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='8' height='8' fill='%23e8e4dc'/%3E%3Crect x='8' width='8' height='8' fill='%23181818'/%3E%3C/svg%3E");background-size:16px 8px;opacity:.12}
.sub{font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:4px;text-transform:uppercase;color:var(--text-faint);margin-top:6px}
.hdr .redline{height:4px;width:100px;margin:14px auto 0;background:linear-gradient(90deg,transparent,var(--red),var(--red),transparent);border-radius:2px;animation:redlinePulse 3s ease-in-out infinite}
.hdr .manual-tag{display:inline-block;margin-top:12px;padding:4px 14px;border:1px solid rgba(232,42,28,0.25);border-left:3px solid var(--red);border-radius:2px;font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:rgba(232,42,28,0.6);background:rgba(232,42,28,0.04)}
.rpm-bar{height:4px;margin:0 -16px 16px;background:rgba(255,255,255,0.03);position:relative;overflow:hidden;border-bottom:1px solid rgba(255,255,255,0.04)}
.rpm-bar .fill{position:absolute;left:0;top:0;height:100%;background:linear-gradient(90deg,#1a8a2e,#2ecc40 20%,var(--gold) 50%,#ff6600 70%,var(--red) 85%,#ff0000 95%);animation:rpmSweep 2.5s ease-out both}
/* Car Selector */
.car-sel{display:flex;gap:0;margin-bottom:16px;border-radius:3px;overflow:hidden;border:1px solid rgba(212,168,39,0.3);animation:fadeIn .5s ease .1s both}
.car-btn{flex:1;padding:12px 8px;border:none;cursor:pointer;font-family:'Teko',sans-serif;font-size:14px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;background:rgba(255,255,255,0.02);color:var(--text-faint);transition:.25s;position:relative}
.car-btn.on{background:rgba(212,168,39,0.12);color:var(--gold)}
.car-btn.on::after{content:"";position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--gold)}
.tabs{display:flex;gap:0;margin-bottom:24px;animation:fadeIn .6s ease .1s both;border-radius:0;overflow:hidden;border:1px solid var(--border);border-left:3px solid var(--red)}
.tab{flex:1;padding:14px 16px;border:none;cursor:pointer;font-family:'Teko',sans-serif;font-size:17px;font-weight:600;letter-spacing:3px;text-transform:uppercase;background:rgba(255,255,255,0.02);color:var(--text-faint);transition:.25s;position:relative}
.tab.on{background:rgba(232,42,28,0.1);color:var(--red)}
.tab.on::after{content:"";position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--red)}
.lbl{display:flex;align-items:center;gap:8px;margin-bottom:10px;font-family:'Teko',sans-serif;font-size:16px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:var(--text-dim)}
.lbl::before{content:"";width:4px;height:16px;background:var(--red);border-radius:1px;box-shadow:0 0 6px rgba(232,42,28,0.3)}
.pills{display:flex;gap:8px;flex-wrap:wrap}
.pill{padding:11px 22px;border-radius:3px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.025);color:#908a80;font-family:'Teko',sans-serif;font-size:17px;font-weight:500;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:.25s;user-select:none;position:relative;overflow:hidden}
.pill:active{transform:scale(.95)}
.pill.on{background:rgba(212,168,39,0.12);border-color:var(--gold);color:var(--gold);box-shadow:0 0 14px rgba(212,168,39,0.12)}
.pill.loose.on{background:rgba(232,42,28,0.1);border-color:var(--red);color:var(--red);box-shadow:0 0 14px rgba(232,42,28,0.15)}
.pill.tight.on{background:rgba(40,116,200,0.1);border-color:var(--blue);color:var(--blue);box-shadow:0 0 14px rgba(40,116,200,0.12)}
.pill.neutral.on{background:rgba(40,168,68,0.1);border-color:var(--green);color:var(--green)}
.pill.sm{font-size:15px;padding:9px 16px}
.pill.on::before{content:"";position:absolute;top:0;left:0;width:4px;height:100%;background:currentColor;opacity:.4}
.sev-btn{padding:12px 16px;border-radius:3px;cursor:pointer;transition:.25s;display:flex;flex-direction:column;gap:3px;min-width:95px;user-select:none}
.sev-btn:active{transform:scale(.95)}
.sev-btn .sl{font-family:'Teko',sans-serif;font-size:18px;font-weight:600;letter-spacing:1px;text-transform:uppercase}
.sev-btn .sd{font-family:'Rajdhani',sans-serif;font-size:11px;line-height:1.3;font-weight:400}
.sel{width:100%;padding:13px 16px;background:rgba(255,255,255,0.035);border:1px solid var(--border);border-left:3px solid var(--red);border-radius:3px;color:var(--text);font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:500;cursor:pointer;appearance:none;-webkit-appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l5 5 5-5' stroke='%23e82a1c' stroke-width='2' fill='none'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 16px center}.sel:focus{outline:0;border-color:var(--red)}.sel option{background:#0e0e10;color:var(--text)}
.go{width:100%;padding:18px;border:0;border-radius:3px;font-family:'Teko',sans-serif;font-size:20px;font-weight:700;letter-spacing:4px;text-transform:uppercase;cursor:pointer;transition:.3s;background:linear-gradient(135deg,var(--red) 0%,var(--red-dark) 100%);color:white;margin-top:14px;box-shadow:0 4px 24px var(--red-glow);position:relative;overflow:hidden}
.go::before{content:"";position:absolute;inset:0;background:repeating-linear-gradient(135deg,transparent,transparent 10px,rgba(255,255,255,0.03) 10px,rgba(255,255,255,0.03) 20px)}
.go:disabled{opacity:.2;cursor:not-allowed;box-shadow:none}
.go:active:not(:disabled){transform:scale(.97)}
.rst{width:100%;padding:12px;border:1px solid rgba(255,255,255,0.08);border-radius:3px;background:0;font-family:'Teko',sans-serif;font-size:15px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:var(--text-faint);cursor:pointer}
.card{margin-bottom:20px;padding:22px 18px;background:linear-gradient(135deg,rgba(15,15,18,0.95),rgba(12,12,14,0.98));border:1px solid var(--border);border-radius:4px;position:relative;overflow:hidden}
.card::after{content:"";position:absolute;top:0;left:0;width:4px;height:100%;background:linear-gradient(180deg,var(--red),var(--red-dark));box-shadow:0 0 8px rgba(232,42,28,0.3)}
.card-hdr{display:flex;align-items:center;gap:10px;margin-bottom:6px;position:relative;z-index:1}
.card-hdr h3{font-family:'Teko',sans-serif;font-size:24px;font-weight:600;letter-spacing:2px;text-transform:uppercase}
.sev-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;border-radius:2px;margin-bottom:14px;position:relative;z-index:1}
.sev-badge span{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase}
.intro-text{color:#9a9688;font-size:14px;line-height:1.6;margin-bottom:16px;font-style:italic;position:relative;z-index:1;border-left:3px solid rgba(232,42,28,0.3);padding-left:14px}
.sug{padding:14px 16px;margin-bottom:8px;background:rgba(255,255,255,0.015);border:1px solid rgba(255,255,255,0.05);border-left:3px solid rgba(232,42,28,0.15);border-radius:2px;transition:.25s;position:relative;z-index:1}
.sug:active,.sug:hover{background:rgba(232,42,28,0.04);border-left-color:var(--red)}
.sug .num{color:var(--red);font-family:'Teko',sans-serif;font-size:18px;font-weight:700;min-width:26px;opacity:.5}
.sug .adj{color:var(--text);font-family:'Teko',sans-serif;font-size:18px;font-weight:600;letter-spacing:1px;text-transform:uppercase}
.sug .tip{color:#a8a49a;font-size:13px;line-height:1.7;margin-left:36px;margin-top:4px;font-family:'Rajdhani',sans-serif;font-weight:500}
.ibox{padding:14px 16px;border-radius:3px;margin-bottom:10px;position:relative;z-index:1}
.ibox .il{font-family:'Teko',sans-serif;font-size:15px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;margin-bottom:6px}
.ibox p{color:#d4d0c8;font-size:14px;line-height:1.6;font-family:'Rajdhani',sans-serif;font-weight:500}
.nbox{padding:20px;border-radius:4px;background:rgba(40,168,68,0.06);border:1px solid rgba(40,168,68,0.2);border-left:4px solid var(--green)}
.nbox h4{font-family:'Teko',sans-serif;font-size:20px;font-weight:600;letter-spacing:2px;color:var(--green);display:flex;align-items:center;gap:8px;margin-bottom:8px;text-transform:uppercase}
.nbox p{color:var(--text-dim);font-size:14px;line-height:1.6;font-family:'Rajdhani',sans-serif}
.sep{width:100%;height:2px;margin:16px 0 20px;background:linear-gradient(90deg,var(--red),rgba(232,42,28,0.4) 30%,transparent)}
.sec-lbl{font-family:'Teko',sans-serif;font-size:18px;font-weight:600;letter-spacing:5px;text-transform:uppercase;color:var(--red);margin-bottom:20px;text-align:center;display:flex;align-items:center;justify-content:center;gap:14px}
.sec-lbl::before,.sec-lbl::after{content:"";flex:1;height:2px;max-width:50px}
.sec-lbl::before{background:linear-gradient(90deg,transparent,rgba(232,42,28,0.4))}
.sec-lbl::after{background:linear-gradient(270deg,transparent,rgba(232,42,28,0.4))}
details{margin-bottom:20px}details summary{font-family:'Teko',sans-serif;font-size:15px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:var(--text-faint);cursor:pointer;padding:12px 0}
details .ref{padding:16px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.04);border-left:3px solid rgba(232,42,28,0.2);border-radius:2px;font-size:13px;color:#7a7668;line-height:1.8;font-family:'Rajdhani',sans-serif;font-weight:500}
details .ref strong{color:var(--text-dim)}
.ftr{text-align:center;margin-top:24px;font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#2a2820}
.ftr-bar{height:8px;margin:20px -16px 0;background-image:url("data:image/svg+xml,%3Csvg width='16' height='8' viewBox='0 0 16 8' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='8' height='8' fill='%23e8e4dc'/%3E%3Crect x='8' width='8' height='8' fill='%23181818'/%3E%3C/svg%3E");background-size:16px 8px;opacity:.08}
.tire-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.tire-corner{padding:14px;background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:4px;border-left:3px solid var(--red)}
.tire-corner.rear{border-left-color:var(--gold)}
.tire-corner-label{font-family:'Teko',sans-serif;font-size:15px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);margin-bottom:8px}
.tire-input{width:100%;padding:8px 10px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:3px;color:var(--text);font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:600;text-align:center}
.tire-input:focus{outline:0;border-color:var(--red);box-shadow:0 0 0 2px rgba(232,42,28,0.12)}
.tire-input::placeholder{color:rgba(255,255,255,0.15);font-weight:400}
.gap{margin-bottom:22px}.hide{display:none!important}
</style>
</head>
<body>
<div class="bg"><div class="skid1"></div><div class="skid2"></div><div class="heat1"></div><div class="heat2"></div><div class="checker"></div></div>
<div class="app" id="app">
<div class="hdr">
  <div class="flag-bar"></div>
  <img src="logo.png" alt="The Big Chief" style="width:min(90%,400px);height:auto;margin:0 auto 8px;display:block">
  <p class="sub" style="font-size:11px;letter-spacing:3px;margin-top:2px;color:var(--text-faint)">iRacing Setup Advisor · Multi-Car</p>
  <div class="redline"></div>
  <div class="manual-tag">Manual Verified</div>
</div>
<div class="rpm-bar"><div class="fill"></div></div>
<!-- Car Selector -->
<div class="car-sel" id="car-sel"></div>
<a href="Big%20Chief.apk" download style="display:block;width:100%;margin-bottom:16px;padding:12px;border-radius:3px;border:1px solid rgba(40,168,68,0.4);border-left:3px solid var(--green);background:rgba(40,168,68,0.08);text-align:center;text-decoration:none;font-family:'Teko',sans-serif;font-size:16px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--green)">📲 Download Android App</a>
<div class="tabs"><button class="tab on" data-t="handling">Handling</button><button class="tab" data-t="gearing">Gearing</button><button class="tab" data-t="tires">Tires</button></div>
<div id="p-handling">
<div class="gap"><label class="lbl">Where in the corner?</label><div class="pills" id="corner-pills"></div></div>
<div class="gap"><label class="lbl">How's the car handling?</label><div class="pills" id="handling-pills"></div></div>
<div id="sev-section" class="hide"><div class="gap"><label class="lbl">How bad is it?</label><div class="pills" id="sev-pills"></div></div></div>
<div id="neutral-msg" class="hide"></div>
</div>
<div id="p-gearing" class="hide">
<div class="gap"><label class="lbl">Select Track</label><select class="sel" id="track-sel"><option value="">Choose a track...</option></select></div>
<div class="gap"><label class="lbl">How hard on the chip?</label><div class="pills" id="chip-pills"></div></div>
</div>
<div id="p-tires" class="hide">
<label class="lbl">Enter Cold Pressures (psi)</label>
<div class="tire-grid">
  <div class="tire-corner"><div class="tire-corner-label">Left Front</div><input type="number" class="tire-input" id="lf-cold" placeholder="Cold" step="0.5" inputmode="decimal"></div>
  <div class="tire-corner"><div class="tire-corner-label">Right Front</div><input type="number" class="tire-input" id="rf-cold" placeholder="Cold" step="0.5" inputmode="decimal"></div>
  <div class="tire-corner rear"><div class="tire-corner-label">Left Rear</div><input type="number" class="tire-input" id="lr-cold" placeholder="Cold" step="0.5" inputmode="decimal"></div>
  <div class="tire-corner rear"><div class="tire-corner-label">Right Rear</div><input type="number" class="tire-input" id="rr-cold" placeholder="Cold" step="0.5" inputmode="decimal"></div>
</div>
<label class="lbl">Enter Hot Pressures (psi)</label>
<div class="tire-grid">
  <div class="tire-corner"><div class="tire-corner-label">Left Front</div><input type="number" class="tire-input" id="lf-hot" placeholder="Hot" step="0.5" inputmode="decimal"></div>
  <div class="tire-corner"><div class="tire-corner-label">Right Front</div><input type="number" class="tire-input" id="rf-hot" placeholder="Hot" step="0.5" inputmode="decimal"></div>
  <div class="tire-corner rear"><div class="tire-corner-label">Left Rear</div><input type="number" class="tire-input" id="lr-hot" placeholder="Hot" step="0.5" inputmode="decimal"></div>
  <div class="tire-corner rear"><div class="tire-corner-label">Right Rear</div><input type="number" class="tire-input" id="rr-hot" placeholder="Hot" step="0.5" inputmode="decimal"></div>
</div>
</div>
<button class="go" id="go-btn" disabled>🏁 Get Setup Advice</button>
<div id="results" class="hide"></div>
</div>
<script>
// ═══════════════════════════════════════════════════════════════
// CAR DEFINITIONS — each car has its own specs, adjustments, and advice
// ═══════════════════════════════════════════════════════════════
const CARS={
lms:{name:"Late Model Stock",rpm:"7,200",hp:"500 bhp",disp:"350ci V8",torque:"450 lb-ft",weight:"2800 lbs",shift:"No tach · Upshift: lift · Downshift: blip · No clutch once rolling",

adv:{"Entry-Loose":{title:"Loose on Entry",mild:{intro:"Slight wiggle on turn-in. One small change:",items:[{a:"Brake Balance Bar",t:"Increase 0.5–1% (more front bias). Keeps front loaded so rear doesn't step out."},{a:"Rear Rebound Stiffness",t:"Increase 1-2 clicks — holds rear during braking-to-turn-in transition."}]},moderate:{intro:"Rear stepping out noticeably. Combine 2-3:",items:[{a:"Brake Balance Bar",t:"Increase 1–2% to keep weight forward."},{a:"Front Bump Stiffness",t:"Increase 2-3 clicks — tightens under braking."},{a:"Cross Weight",t:"Increase slightly — adds weight to LR/RF diagonal."},{a:"RF Packer",t:"Add small RF packer — stabilizes entry."}]},severe:{intro:"Car spinning on entry. Work through in order:",items:[{a:"Brake Balance Bar",t:"Increase 2-3% toward front."},{a:"Cross Weight",t:"Increase 0.5–1.0%."},{a:"Front Bump Stiffness",t:"Increase 3-5 clicks."},{a:"Rear Rebound Stiffness",t:"Increase 3-4 clicks."},{a:"LR Track Bar Height",t:"Lower left-side mount — increases LR grip."},{a:"Nose Weight / Ballast",t:"Move ballast forward."},{a:"Front Caster Split",t:"Reduce LF-to-RF caster split."}]}},

let S={car:"lms",tab:"handling",corner:"",handling:"",sev:"",track:"",chip:"",show:false};
const $=id=>document.getElementById(id);
function C(){return CARS[S.car]}

// ═══ BUILD UI ═══════════════════════════════════════════════
// Car selector
var csel=$("car-sel");
["lms","ss","ms"].forEach(k=>{var b=document.createElement("button");b.className="car-btn"+(S.car===k?" on":"");b.dataset.c=k;b.textContent=CARS[k].name;b.onclick=()=>{S.car=k;S.show=false;S.corner="";S.handling="";S.sev="";render()};csel.appendChild(b)});

function mkPills(el,items,grp,cls){el.innerHTML="";items.forEach(v=>{var b=document.createElement("button");b.className="pill"+(cls?" "+cls:"");if(grp==="handling"){b.textContent=({Loose:"🔥 ",Tight:"🧊 ",Neutral:"✅ "}[v]||"")+v;b.classList.add(v.toLowerCase())}else b.textContent=v;b.dataset.v=v;b.onclick=()=>{if(grp==="corner"){S.corner=v;S.sev=""}else if(grp==="handling"){S.handling=v;S.sev=""}else if(grp==="chip")S.chip=v;S.show=false;render()};el.appendChild(b)})}

function render(){
var c=C();
// Car selector
$("car-sel").querySelectorAll(".car-btn").forEach(b=>b.classList.toggle("on",b.dataset.c===S.car));
// Tabs
document.querySelectorAll(".tab").forEach(b=>b.classList.toggle("on",b.dataset.t===S.tab));
$("p-handling").classList.toggle("hide",S.tab!=="handling");$("p-gearing").classList.toggle("hide",S.tab!=="gearing");$("p-tires").classList.toggle("hide",S.tab!=="tires");
// Pills
$("corner-pills").querySelectorAll(".pill").forEach(p=>p.classList.toggle("on",p.dataset.v===S.corner));
$("handling-pills").querySelectorAll(".pill").forEach(p=>p.classList.toggle("on",p.dataset.v===S.handling));
$("chip-pills").querySelectorAll(".pill").forEach(p=>p.classList.toggle("on",p.dataset.v===S.chip));
var showSev=S.corner&&S.handling&&S.handling!=="Neutral";
$("sev-section").classList.toggle("hide",!showSev);
$("sev-pills").querySelectorAll(".sev-btn").forEach(b=>{var v=b.dataset.v,s=SEV[v],on=S.sev===v;b.style.border="1px solid "+(on?s.color:"rgba(255,255,255,0.1)");b.style.background=on?s.color+"18":"rgba(255,255,255,0.03)";b.querySelector(".sl").style.color=on?s.color:"#908a80";b.querySelector(".sd").style.color=on?s.color+"cc":"var(--text-faint)"});
if(S.handling==="Neutral"&&S.corner){$("neutral-msg").classList.remove("hide");$("neutral-msg").innerHTML='<div class="nbox"><h4>✅ CAR IS BALANCED</h4><p>Neutral on '+S.corner.toLowerCase()+'? You\'re in the zone. Smooth hands, progressive throttle, consistent braking. '+c.name+' rev limit: '+c.rpm+' RPM.</p></div>'}else{$("neutral-msg").classList.add("hide");$("neutral-msg").innerHTML=""}

var hOk=S.corner&&S.handling&&S.handling!=="Neutral"&&S.sev,gOk=S.track&&S.chip;
var tOk=false;
if(S.tab==="tires"){var lfc=parseFloat($("lf-cold").value),rfc=parseFloat($("rf-cold").value),lrc=parseFloat($("lr-cold").value),rrc=parseFloat($("rr-cold").value),lfh=parseFloat($("lf-hot").value),rfh=parseFloat($("rf-hot").value),lrh=parseFloat($("lr-hot").value),rrh=parseFloat($("rr-hot").value);tOk=!isNaN(lfc)&&!isNaN(rfc)&&!isNaN(lrc)&&!isNaN(rrc)&&!isNaN(lfh)&&!isNaN(rfh)&&!isNaN(lrh)&&!isNaN(rrh)}

h+='</div>'}}

if(S.tab==="gearing"&&gOk){var t=TRACKS.find(x=>x.n===S.track);if(t){

else if(cl==="Barely touching it"){chipIntro="Light on the brakes — fine-tune the gear:";chipGear=[{a:"Test UP 1-2 Points",t:"Slightly shorter gear gives a touch more engine braking — lets you get off the brake sooner."},{a:"Or DOWN 1-2 Points",t:"If car bogs on exit, go taller for more top-end pull."},{a:"Driving Tip",t:t.t==="short"?"Short tracks usually need more brake than expected.":"Bigger tracks: light braking may be fine."}]}
else{chipIntro="Not braking at all — gear may be too short:";chipGear=[{a:"Go Taller (Lower Number)",t:"Go DOWN 3-5 points (e.g., 4.61→4.56). Less engine braking = more top speed."},{a:"Learn the Chip",t:"Fastest drivers use both engine braking AND the brake. Try a taller gear and learn to trail-brake."},{a:"Brake Balance"+(S.car==="ms"?"":" Bar"),t:S.car==="ms"?"No brake balance on Mini Stock — use trail-braking technique.":"Start around 55-57% as you learn brake feel."}]}
h+='<div class="card"><div class="card-hdr"><span style="font-size:20px">⚙️</span><h3 style="color:var(--gold)">Gearing <span style="font-size:14px;color:var(--text-faint)">('+c.name+')</span></h3></div>';
h+='<div class="ibox" style="background:rgba(212,168,39,0.05);border:1px solid rgba(212,168,39,0.15)"><div class="il" style="color:var(--gold)">Rear End Ratio</div><p>'+g+'</p></div>';
if(chipGear.length>0){var hard=cl==="Hard on it";h+='<div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--border);position:relative;z-index:1"><div style="display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:3px;background:'+(hard?"rgba(232,42,28,0.1);border:1px solid rgba(232,42,28,0.3)":"rgba(212,168,39,0.1);border:1px solid rgba(212,168,39,0.25)")+';margin-bottom:10px"><span style="font-size:12px">'+(hard?"🛑":"🔧")+'</span><span style="font-family:Barlow Condensed,sans-serif;font-size:12px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:'+(hard?"var(--red)":"var(--gold)")+'">Chip-Based Adjustments</span></div>';
h+='<p class="intro-text">'+chipIntro+'</p>';chipGear.forEach(function(s,i){h+='<div class="sug" style="animation:fadeIn .4s ease '+(i*.06)+'s both"><div style="display:flex;gap:10px;align-items:baseline;margin-bottom:4px"><span class="num">'+String(i+1).padStart(2,"0")+'</span><span class="adj">'+s.a+'</span></div><p class="tip">'+s.t+'</p></div>'});h+='</div>'}
h+='<div class="ibox" style="margin-top:12px;background:var(--surface);border:1px solid rgba(255,255,255,0.04)"><div class="il" style="color:var(--text-faint)">'+c.name+' Specs</div><p style="color:#7a7668;font-size:13px">Rev limit: '+c.rpm+' RPM · '+c.disp+' · '+c.hp+' · '+c.torque+' · '+c.shift+'</p></div></div>'}}

// === TIRES ===
if(S.tab==="tires"&&tOk){
var lfc=parseFloat($("lf-cold").value),rfc=parseFloat($("rf-cold").value),lrc=parseFloat($("lr-cold").value),rrc=parseFloat($("rr-cold").value);
var lfh=parseFloat($("lf-hot").value),rfh=parseFloat($("rf-hot").value),lrh=parseFloat($("lr-hot").value),rrh=parseFloat($("rr-hot").value);
var lfB=lfh-lfc,rfB=rfh-rfc,lrB=lrh-lrc,rrB=rrh-rrc;
h+='<div class="card"><div class="card-hdr"><span style="font-size:20px">🏎️</span><h3 style="color:var(--gold)">Tire Analysis <span style="font-size:14px;color:var(--text-faint)">('+c.name+')</span></h3></div>';
h+='<div style="position:relative;z-index:1;margin-bottom:16px"><div class="il" style="color:var(--text-dim)">Pressure Build (Hot - Cold)</div><div class="tire-grid" style="margin-bottom:0">';
[{n:"LF",b:lfB,c:lfc,h:lfh},{n:"RF",b:rfB,c:rfc,h:rfh},{n:"LR",b:lrB,c:lrc,h:lrh},{n:"RR",b:rrB,c:rrc,h:rrh}].forEach(function(cr){
var cl=cr.b>4?"var(--red)":cr.b<1.5?"var(--blue)":"var(--green)";var lb=cr.b>4?"HIGH":cr.b<1.5?"LOW":"NORMAL";
h+='<div style="padding:12px;background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:4px;text-align:center"><div style="font-family:Teko;font-size:15px;font-weight:600;letter-spacing:2px;color:var(--text-dim)">'+cr.n+'</div><div style="font-family:Teko;font-size:13px;color:var(--text-faint)">'+cr.c.toFixed(1)+'→'+cr.h.toFixed(1)+'</div><div style="font-family:Teko;font-size:22px;font-weight:700;color:'+cl+'">+'+cr.b.toFixed(1)+'</div><div style="font-size:10px;font-family:Barlow Condensed;letter-spacing:1px;text-transform:uppercase;color:'+cl+'">'+lb+'</div></div>'});

if(Math.abs(rfB-lfB)>1.5)tips.push({a:rfB>lfB?"RF Building More":"LF Building More",t:(rfB>lfB?"RF":"LF")+" building +"+(rfB>lfB?rfB:lfB).toFixed(1)+" vs "+(rfB>lfB?"LF +"+lfB.toFixed(1):"RF +"+rfB.toFixed(1))+". "+(rfB>lfB?"Normal on ovals — if 4+ psi, raise RF cold.":"Unusual on ovals — check cross weight.")});

[{n:"LF",b:lfB},{n:"RF",b:rfB},{n:"LR",b:lrB},{n:"RR",b:rrB}].forEach(function(cr){if(cr.b>5)tips.push({a:cr.n+" Very High",t:cr.n+" building +"+cr.b.toFixed(1)+" — overworking. Raise cold 1–2 psi."});if(cr.b<1)tips.push({a:cr.n+" Very Low",t:cr.n+" only +"+cr.b.toFixed(1)+" — not working. Lower cold 0.5–1 psi."})});
if(tips.length===0)tips.push({a:"Pressures Balanced",t:"All tires building at reasonable rates. Cold pressures well matched."});
h+='<div style="position:relative;z-index:1">';tips.forEach(function(s,i){h+='<div class="sug" style="animation:fadeIn .4s ease '+(i*.06)+'s both"><div style="display:flex;gap:10px;align-items:baseline;margin-bottom:4px"><span class="num">'+String(i+1).padStart(2,"0")+'</span><span class="adj">'+s.a+'</span></div><p class="tip">'+s.t+'</p></div>'});
